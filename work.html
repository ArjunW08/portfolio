<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Work Experience | Arjun's Portfolio</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <meta name="description" content="Arjun's professional work experience and career journey.">
    <link rel="icon" href="assets/images/logo.png">
    <link href="assets/css/style.css" rel="stylesheet">
    <noscript id="deferred-styles">
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </noscript>
</head>

<body class="layout-page">

    <!-- Navigation -->
    <div id="navbar"></div>
    <script src="assets/js/navbar.js"></script>

    <!-- Site Content -->
    <div class="site-content">
        <div class="container">

            <div class="mainheading">
                <h1 style="font-weight:700; margin-bottom:0.5rem;">Work Experience</h1>
                <p class="lead">My professional journey — roles, responsibilities, and the technologies I've worked
                    with.</p>
            </div>

            <!-- Timeline -->
            <div class="timeline" id="work-timeline">
                <!-- Loaded dynamically from data.json -->

            <!-- Projects (loaded from GitHub) -->
            <div class="work-projects-section" style="margin-top: 3rem;">
                <div class="section-title">
                    <h2><span>Projects</span></h2>
                </div>
                <div id="work-projects"></div>
            </div>

        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <div>Copyright &copy; 2026 Arjun</div>
                <div class="footer-links">
                    <a href="mailto:arjunwankhede2905@gmail.com" title="Email"><i class="fas fa-envelope"></i> Email</a>
                    <a href="https://www.linkedin.com/in/wankhedearjun/" target="_blank" title="LinkedIn"><i

                        GitHub</a>
                </div>
            </div>

    </div>

    <script src="assets/js/content-loader.js"></script>
    <script>
        loadWorkExperience('#work-timeline');
        loadProjects('#work-projects', 0, 'card');
    </script>
    <script src="assets/js/hero-bg.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
        var loadDeferredStyles = function () {
            var addStylesNode = document.getElementById("deferred-styles");
            if (!addStylesNode) return;
            var replacement = document.createElement("div");
            replacement.innerHTML = addStylesNode.textContent;
            document.body.appendChild(replacement);
            addStylesNode.parentElement.removeChild(addStylesNode);
        };
        var raf = window.requestAnimationFrame || window.mozRequestAnimationFrame ||
            window.webkitRequestAnimationFrame || window.msRequestAnimationFrame;
        if (raf) raf(function () { window.setTimeout(loadDeferredStyles, 0); });
        else window.addEventListener('load', loadDeferredStyles);
    </script>
</body>

</html>
